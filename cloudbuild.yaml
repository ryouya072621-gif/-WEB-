# GCP Cloud Buildの設定ファイル
# GitHubと連携して自動デプロイを行う

steps:
  # ステップ1: Dockerイメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web-app:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web-app:latest'
      - '.'

  # ステップ2: イメージをContainer Registryにプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web-app:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web-app:latest'

  # ステップ3: Cloud Runにデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'web-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/web-app:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'  # 東京リージョン
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'  # 認証不要で公開アクセス可能
      - '--port'
      - '8080'

# ビルドしたイメージ
images:
  - 'gcr.io/$PROJECT_ID/web-app:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/web-app:latest'

# タイムアウト設定（10分）
timeout: '600s'

# 使用するマシンタイプ
options:
  machineType: 'N1_HIGHCPU_8'
